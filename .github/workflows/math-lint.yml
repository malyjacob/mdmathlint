name: Math Lint

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  mdmathlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: node dist/cli.js "README.md" "README_zh.md" --profile strict --format sarif > mdmathlint.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: mdmathlint.sarif
